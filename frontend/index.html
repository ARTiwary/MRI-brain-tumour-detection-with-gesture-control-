<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURO-CORE v3.4 | Sterile Interface</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        
        body { margin: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background: #020617; }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }
        
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.2); }
        
        #gesture-cursor {
            position: fixed; top: 0; left: 0; width: 30px; height: 30px; border: 2px solid #00f2ff;
            border-radius: 50%; pointer-events: none; z-index: 9999; opacity: 0;
            box-shadow: 0 0 15px #00f2ff; transition: opacity 0.3s ease; will-change: transform;
        }

        .typewriter-text { 
            border-right: .15em solid #00f2ff; 
            white-space: nowrap; 
            animation: blink-caret .75s step-end infinite;
        }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00f2ff; } }
        
        .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .neural-glow { box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); border: 1px solid rgba(0, 242, 255, 0.5); }
    </style>
</head>
<body class="text-white">

    <div id="canvas-container"></div>
    <video id="webcam" class="hidden" autoplay playsinline></video>
    <div id="gesture-cursor"><div class="absolute inset-0 bg-cyan-400/20 rounded-full animate-ping"></div></div>

    <div class="flex flex-col items-center justify-center min-h-screen p-8">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-bold tracking-tighter italic text-cyan-400" style="font-family: 'Orbitron';">NEURO<span class="text-white">CORE</span></h1>
            <p class="text-slate-500 tracking-[0.4em] uppercase text-[10px] mt-2">HCI STERILE DIAGNOSTIC INTERFACE</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-5xl w-full h-[450px]">
            <div class="glass-panel rounded-[40px] p-8 flex flex-col shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-[10px] tracking-widest text-cyan-400 font-bold" style="font-family: 'Orbitron';">01_INPUT_STREAM</h2>
                    <span id="sensor-stat" class="status-pill bg-red-500/20 text-red-500 border border-red-500/50">OFFLINE</span>
                </div>
                <div onclick="document.getElementById('fileElem').click()" class="flex-1 border-2 border-dashed border-cyan-500/20 rounded-3xl flex flex-col items-center justify-center hover:bg-cyan-500/5 transition-all cursor-pointer mb-4">
                    <input type="file" id="fileElem" multiple accept="image/*" class="hidden" onchange="addToQueue(this.files)">
                    <i class="fas fa-microchip text-2xl text-cyan-500 mb-2"></i>
                    <p class="text-[10px] font-bold uppercase tracking-widest">Pinch to Upload</p>
                </div>
                <div id="file-queue" class="h-20 overflow-y-auto space-y-2 text-[10px] pr-2">
                    <p class="text-slate-600 italic">No data synced...</p>
                </div>
            </div>

            <div class="glass-panel rounded-[40px] p-8 flex flex-col justify-between shadow-2xl">
                <div>
                    <h2 class="text-[10px] tracking-widest text-cyan-400 font-bold mb-6" style="font-family: 'Orbitron';">02_SYSTEM_LOG</h2>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5 font-mono text-[10px] space-y-2 text-slate-300">
                        <p>> Mode: <span class="text-cyan-400">STERILE_GESTURE</span></p>
                        <p>> Reset: <span class="text-yellow-500 italic">SHOW FULL PALM</span></p>
                        <p>> Target: <span class="text-green-500">MRI_SCAN_ENGINE</span></p>
                    </div>
                </div>
                <button onclick="processBatch()" id="process-btn" class="hidden w-full bg-cyan-500 text-black font-black py-4 rounded-2xl shadow-[0_0_30px_rgba(0,242,255,0.3)] uppercase tracking-widest text-xs transform hover:scale-[1.02] transition-all">
                    Initialize Neural Sweep
                </button>
            </div>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 z-[200] hidden bg-slate-950/98 backdrop-blur-3xl overflow-y-auto p-12">
        <button onclick="document.getElementById('result-modal').classList.add('hidden')" class="absolute top-10 right-10 text-white/50 hover:text-white transition-all">
            <i class="fas fa-times text-3xl"></i>
        </button>
        <div id="result-content" class="max-w-4xl mx-auto space-y-24"></div>
    </div>

    <script>
        // --- 1. THREE.JS BACKGROUND ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const stars = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({color: 0x00f2ff, size: 1.2}));
        const starPoints = [];
        for(let i=0; i<3000; i++) starPoints.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
        stars.geometry.setAttribute('position', new THREE.Float32BufferAttribute(starPoints, 3));
        scene.add(stars); camera.position.z = 800;
        function animate() { requestAnimationFrame(animate); stars.rotation.y += 0.0006; renderer.render(scene, camera); }
        animate();

        // --- 2. ENHANCED GESTURE ENGINE (FIXED PALM RESET) ---
        const videoElement = document.getElementById('webcam');
        const cursor = document.getElementById('gesture-cursor');
        const sensorStat = document.getElementById('sensor-stat');
        let isPinching = false, lastAction = 0;

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                cursor.style.opacity = "0"; 
                sensorStat.innerText = "OFFLINE"; sensorStat.className = "status-pill bg-red-500/20 text-red-500";
                return;
            }

            cursor.style.opacity = "1";
            sensorStat.innerText = "ONLINE"; sensorStat.className = "status-pill bg-green-500/20 text-green-500 animate-pulse";
            
            const hand = results.multiHandLandmarks[0];
            const x = (1 - hand[8].x) * window.innerWidth;
            const y = hand[8].y * window.innerHeight;
            cursor.style.transform = `translate3d(${x}px, ${y}px, 0)`;

            // --- RESET GESTURE: FULL OPEN PALM ---
            // Logic: Compare tip Y with pip (joint below tip) Y for all fingers
            const isIndexUp = hand[8].y < hand[6].y;
            const isMiddleUp = hand[12].y < hand[10].y;
            const isRingUp = hand[16].y < hand[14].y;
            const isPinkyUp = hand[20].y < hand[18].y;

            if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
                if (Date.now() - lastAction > 3000) {
                    lastAction = Date.now();
                    sensorStat.innerText = "RESETTING...";
                    cursor.style.boxShadow = "0 0 50px #ffcc00";
                    setTimeout(() => window.location.reload(), 800);
                    return;
                }
            }

            // --- CLICK GESTURE: PINCH ---
            const pinchDist = Math.hypot(hand[8].x - hand[4].x, hand[8].y - hand[4].y);
            if (pinchDist < 0.05) {
                if(!isPinching && (Date.now() - lastAction > 1500)) {
                    isPinching = true; lastAction = Date.now();
                    cursor.style.backgroundColor = "#bc13fe";
                    const target = document.elementFromPoint(x, y);
                    if(target) target.click();
                }
            } else if (pinchDist > 0.08) { 
                isPinching = false; cursor.style.backgroundColor = "transparent"; 
            }
        });

        new Camera(videoElement, { onFrame: async () => await hands.send({image: videoElement}), width: 640, height: 480 }).start();

        // --- 3. UI LOGIC (TYPEWRITER & QUEUE) ---
        function typeWriterEffect(elementId, text, speed = 100) {
            let i = 0;
            const element = document.getElementById(elementId);
            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, speed);
                }
            }
            typing();
        }

        let queue = [];
        function addToQueue(files) {
            const list = document.getElementById('file-queue');
            if(queue.length === 0) list.innerHTML = "";
            Array.from(files).forEach(f => {
                queue.push(f);
                const reader = new FileReader();
                reader.onload = (e) => {
                    list.innerHTML += `<div class="p-2 bg-white/5 border-l-2 border-cyan-500 text-[8px] flex items-center mb-1">
                        <img src="${e.target.result}" class="w-4 h-4 mr-2 rounded"> ${f.name}</div>`;
                };
                reader.readAsDataURL(f);
            });
            document.getElementById('process-btn').classList.remove('hidden');
        }

        async function processBatch() {
            const resArea = document.getElementById('result-content');
            document.getElementById('result-modal').classList.remove('hidden');
            resArea.innerHTML = "<div class='text-center py-20'><p class='text-cyan-400 animate-pulse tracking-widest text-2xl font-bold'>NEURAL SCAN IN PROGRESS...</p></div>";
            
            let buffer = "";
            for(let i=0; i<queue.length; i++) {
                const fd = new FormData(); fd.append('file', queue[i]);
                try {
                    const resp = await fetch("http://127.0.0.1:8000/predict", { method: 'POST', body: fd });
                    const data = await resp.json();
                    
                    const resId = `res-text-${i}`;
                    resArea.insertAdjacentHTML('beforeend', `
                        <div class="flex flex-col lg:flex-row gap-12 items-center border-b border-white/5 pb-16">
                            <div class="flex gap-4">
                                <img src="${URL.createObjectURL(queue[i])}" class="w-48 h-48 rounded-2xl border border-white/10 shadow-xl object-cover">
                                <img src="data:image/jpeg;base64,${data.heatmap}" class="w-48 h-48 rounded-2xl neural-glow object-cover">
                            </div>
                            <div class="flex-1">
                                <h3 id="${resId}" class="text-7xl font-bold italic typewriter-text text-white tracking-tighter"></h3>
                                <div class="mt-4 flex items-center gap-6">
                                    <div class="px-6 py-2 bg-cyan-500 text-black font-black text-xl rounded-full">${data.confidence}% CONFIDENCE</div>
                                </div>
                            </div>
                        </div>`);
                    typeWriterEffect(resId, data.tumor_type);
                } catch(e) { resArea.innerHTML = `<p class="text-red-500">FastAPI Connection Failed</p>`; }
            }
            if(resArea.firstChild) resArea.removeChild(resArea.firstChild);
        }
    </script>
</body>
</html>
