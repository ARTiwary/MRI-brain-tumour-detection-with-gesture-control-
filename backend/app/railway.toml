[build]
builder = "NIXPACKS"

# Instruct the builder to move into the backend subdirectory before compiling
[build.nixpacks]
rootDirectory = "backend/app"

[variables]
PYTHON_VERSION = "3.10.11"
NIXPACKS_PYTHON_VENV_DIR = "/opt/venv"

[deploy]
# Points to where the application should actually run from
rootDirectory = "backend/app"
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5